name: Release

run-name: Release ${{ inputs.bump }} from ${{ inputs.branch }}

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to build the release from
        type: string
        default: main
      bump:
        description: Version bump
        type: choice
        default: preview-patch
        options:
          - patch
          - minor
          - major
          - preview-patch
          - preview-minor
          - preview-major

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: [self-hosted, x64]
    outputs:
      version: ${{ steps.ver.outputs.version }}
      channel: ${{ steps.ver.outputs.channel }}
      dekaf_image: ${{ steps.ver.outputs.dekaf_image }}
      demoapp_image: ${{ steps.ver.outputs.demoapp_image }}
      sha: ${{ steps.ver.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Compute version and image names
        id: ver
        env:
          BUMP: ${{ inputs.bump }}
          BRANCH: ${{ inputs.branch }}
        shell: bash
        run: |
          set -euo pipefail
          latest="$(git tag --list 'v[0-9]*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1 || true)"
          latest="${latest:-v0.0.0}"
          IFS=. read -r MA MI PA <<< "${latest#v}"
          sha="$(git rev-parse HEAD)"
          gsha="g$(git rev-parse --short HEAD)"
          case "$BUMP" in
            patch)         VER="$MA.$MI.$((PA+1))";               channel=release ;;
            minor)         VER="$MA.$((MI+1)).0";                 channel=release ;;
            major)         VER="$((MA+1)).0.0";                   channel=release ;;
            preview-patch) VER="$MA.$MI.$((PA+1))-preview.$gsha"; channel=dev ;;
            preview-minor) VER="$MA.$((MI+1)).0-preview.$gsha";   channel=dev ;;
            preview-major) VER="$((MA+1)).0.0-preview.$gsha";     channel=dev ;;
            *) echo "Unknown bump: $BUMP" >&2; exit 1 ;;
          esac
          if [ "$channel" = release ]; then
            dekaf="visortelle/dekaf";     demoapp="visortelle/dekaf-demoapp"
          else
            dekaf="visortelle/dekaf-dev"; demoapp="visortelle/dekaf-demoapp-dev"
          fi
          {
            echo "version=$VER"
            echo "channel=$channel"
            echo "dekaf_image=$dekaf"
            echo "demoapp_image=$demoapp"
            echo "sha=$sha"
          } >> "$GITHUB_OUTPUT"
          {
            echo "### Release \`$VER\` ($channel) from \`$BRANCH\` @ \`${sha:0:7}\`"
            echo "- $dekaf:$VER"
            echo "- $demoapp:$VER"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check release tag is free
        if: ${{ !startsWith(inputs.bump, 'preview') }}
        env:
          VER: ${{ steps.ver.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          tag="v${VER}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists" >&2; exit 1
          fi

  # Each arch builds natively on its own runner (no QEMU) and pushes by digest
  # only — no tag is published here. The merge job assembles the tag.
  build:
    needs: prepare
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: [self-hosted, x64]
          - arch: arm64
            platform: linux/arm64
            runner: [self-hosted, arm64]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      # LFS is fetched per-runner: the x64 runner stays Nix-only (composite
      # action), the arm64 runner uses its host git-lfs.
      - uses: ./.github/actions/git-lfs-pull
        if: matrix.arch == 'amd64'
      - name: Git LFS pull (host git-lfs)
        if: matrix.arch == 'arm64'
        run: git lfs install --local && git lfs pull && git lfs uninstall --local

      # cleanup: false keeps the docker-container builder (and its BuildKit cache)
      # alive between runs on the persistent runner, so the nix-build / sbt-update
      # layers are reused instead of re-downloaded every release.
      - uses: docker/setup-buildx-action@v3
        with:
          name: dekaf-builder
          cleanup: false

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build dekaf (${{ matrix.platform }})
        id: dekaf
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/dekaf/Dockerfile
          platforms: ${{ matrix.platform }}
          pull: true
          provenance: false
          outputs: type=image,name=${{ needs.prepare.outputs.dekaf_image }},push-by-digest=true,name-canonical=true,push=true

      - name: Build demoapp (${{ matrix.platform }})
        id: demoapp
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/demoapp/Dockerfile
          platforms: ${{ matrix.platform }}
          pull: true
          provenance: false
          outputs: type=image,name=${{ needs.prepare.outputs.demoapp_image }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digests
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests/dekaf /tmp/digests/demoapp
          d='${{ steps.dekaf.outputs.digest }}';   touch "/tmp/digests/dekaf/${d#sha256:}"
          d='${{ steps.demoapp.outputs.digest }}'; touch "/tmp/digests/demoapp/${d#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-dekaf-${{ matrix.arch }}
          path: /tmp/digests/dekaf/*
          if-no-files-found: error
          retention-days: 1

      - uses: actions/upload-artifact@v4
        with:
          name: digests-demoapp-${{ matrix.arch }}
          path: /tmp/digests/demoapp/*
          if-no-files-found: error
          retention-days: 1

  # Runs only after both arches built. Stitches the per-arch digests into the
  # final multi-arch tags (atomic publish), then for real releases bumps the
  # quick-start compose pins, commits, tags, and pushes.
  merge:
    needs: [prepare, build]
    runs-on: [self-hosted, x64]
    env:
      VER: ${{ needs.prepare.outputs.version }}
      DEKAF_IMAGE: ${{ needs.prepare.outputs.dekaf_image }}
      DEMOAPP_IMAGE: ${{ needs.prepare.outputs.demoapp_image }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*

      - name: Create multi-arch manifests
        shell: bash
        run: |
          set -euo pipefail
          dekaf_refs=$(for f in /tmp/digests/digests-dekaf-*/*; do echo "${DEKAF_IMAGE}@sha256:$(basename "$f")"; done)
          demoapp_refs=$(for f in /tmp/digests/digests-demoapp-*/*; do echo "${DEMOAPP_IMAGE}@sha256:$(basename "$f")"; done)
          docker buildx imagetools create -t "${DEKAF_IMAGE}:${VER}"   $dekaf_refs
          docker buildx imagetools create -t "${DEMOAPP_IMAGE}:${VER}" $demoapp_refs
          {
            echo "### Published \`${VER}\`"
            echo "- ${DEKAF_IMAGE}:${VER}"
            echo "- ${DEMOAPP_IMAGE}:${VER}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Bump compose pins, commit, and tag
        if: ${{ !startsWith(inputs.bump, 'preview') }}
        env:
          BRANCH: ${{ inputs.branch }}
        shell: bash
        run: |
          set -euo pipefail
          tag="v${VER}"

          compose="docker/compose/docker-compose.yaml"
          sed -i -E \
            -e "s|(visortelle/dekaf):[^[:space:]]+|\1:${VER}|" \
            -e "s|(visortelle/dekaf-demoapp):[^[:space:]]+|\1:${VER}|" \
            "$compose"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$compose"
          if git diff --cached --quiet; then
            echo "compose already at ${VER}; tagging without a bump commit"
          else
            git commit -m "Release ${tag}"
          fi
          git tag -a "$tag" -m "Release ${tag}"

          git push origin "HEAD:${BRANCH}"
          git push origin "$tag"
