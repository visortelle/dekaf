name: CI

# Runs build + tests on pull requests. This is intentionally separate from
# build.yml (which builds AND pushes Docker images on push). PR CI never logs
# in to or pushes to Docker Hub, so it is safe to run on contributor code.
#
# IMPORTANT (security): this executes PR-authored code (npm/sbt/nix scripts) on
# a self-hosted runner. It must only run for trusted PRs. Enforce that in
# repo Settings -> Actions -> General -> "Fork pull request workflows from
# outside collaborators" -> "Require approval for all outside collaborators".
# Outside PRs then sit in "waiting" until a codeowner clicks "Approve and run".
on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: [self-hosted, x64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Git LFS Pull
        run: git lfs pull

      - name: Installing Nix
        uses: cachix/install-nix-action@v22
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          install_options: --no-daemon
          extra_nix_config: experimental-features = nix-command flakes

      # `make build` builds proto/ui/server AND runs the server suite (sbt test).
      - name: Build + server tests
        shell: bash
        run: nix-shell --run 'make build'

      # UI unit tests (Jest) are not part of `make build`; run them explicitly.
      - name: UI unit tests
        shell: bash
        run: nix-shell --run 'cd ui && make test'
